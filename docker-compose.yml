version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: topic2manim
    ports:
      - "${PORT:-5000}:5000"
    volumes:
      # Persist generated videos, job state, and scripts
      - media_data:/app/media
      - content_data:/app/content
      - public_data:/app/public
    env_file:
      - .env
    environment:
      - PYTHONUNBUFFERED=1
      - PORT=5000
      # Override these in .env for production
      - LLM_PROVIDER=${LLM_PROVIDER:-auto}
      - TTS_PROVIDER=${TTS_PROVIDER:-auto}
      - SUPABASE_URL=${SUPABASE_URL:-}
      - SUPABASE_KEY=${SUPABASE_KEY:-}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 1G
    networks:
      - topic2manim-network
    # Graceful shutdown: wait up to 60s for rendering threads
    stop_grace_period: 60s

  # Optional: Ollama for local LLM inference
  # Uncomment if you want local LLM support without external API keys
  # ollama:
  #   image: ollama/ollama:latest
  #   container_name: topic2manim-ollama
  #   ports:
  #     - "11434:11434"
  #   volumes:
  #     - ollama_data:/root/.ollama
  #   networks:
  #     - topic2manim-network
  #   # For GPU support, uncomment:
  #   # deploy:
  #   #   resources:
  #   #     reservations:
  #   #       devices:
  #   #         - driver: nvidia
  #   #           count: 1
  #   #           capabilities: [gpu]

volumes:
  media_data:
  content_data:
  public_data:
  # ollama_data:

networks:
  topic2manim-network:
    driver: bridge
